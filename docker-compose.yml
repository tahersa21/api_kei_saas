version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: commandcode
      POSTGRES_USER: commandcode
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commandcode"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: >
      sh -c "
        npm install -g pnpm@10 &&
        pnpm --filter @workspace/db run push
      "
    environment:
      DATABASE_URL: postgresql://commandcode:${POSTGRES_PASSWORD}@db:5432/commandcode
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:8080"
    environment:
      PORT: "8080"
      NODE_ENV: production
      DATABASE_URL: postgresql://commandcode:${POSTGRES_PASSWORD}@db:5432/commandcode
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      COMMANDCODE_API_KEY: ${COMMANDCODE_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8080/api/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
