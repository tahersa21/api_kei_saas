openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for CommandCode Chatbot
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: chat
    description: Chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /chat/models:
    get:
      operationId: getChatModels
      tags: [chat]
      summary: Get available CommandCode models
      description: Returns a list of available CommandCode AI models (dynamic from API, cached)
      responses:
        "200":
          description: List of models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelList"

  /chat/rc-models:
    get:
      operationId: getChatRcModels
      tags: [chat]
      summary: Get available Right Code models
      description: Fetches model list from right.codes dynamically using the provided API key
      parameters:
        - in: header
          name: X-Rightcode-Key
          required: true
          schema:
            type: string
          description: Right Code API key
      responses:
        "200":
          description: List of Right Code models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelList"
        "400":
          description: Missing API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/ag-models:
    get:
      operationId: getChatAgModels
      tags: [chat]
      summary: Get available AiGoCode models
      description: Fetches model list from aigocode.com using the provided API key
      parameters:
        - in: header
          name: X-Aigocode-Key
          required: true
          schema:
            type: string
          description: AiGoCode API key
      responses:
        "200":
          description: List of AiGoCode models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelList"
        "400":
          description: Missing API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Model:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        group:
          type: string
        description:
          type: string
        tier:
          type: string
          enum: [free, pro]
        provider:
          type: string
          enum: [commandcode, rightcode, aigocode]
      required:
        - id
        - name
        - group
        - description
        - tier

    ModelList:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/Model"
      required:
        - models
