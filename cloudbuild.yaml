# ─────────────────────────────────────────────────────────────────────────────
# Google Cloud Build — Build + Deploy to Cloud Run
# Usage:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions _SERVICE_NAME=commandcode,_REGION=me-central1
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _SERVICE_NAME: commandcode
  _REGION: me-central1
  _REPO: cloud-run-source-deploy

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── 1. Build Docker image ──────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:latest
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:latest
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - .

  # ── 2. Push to Artifact Registry ──────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}

  # ── 3. Deploy to Cloud Run ─────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --memory
      - 1Gi
      - --cpu
      - "1"
      - --min-instances
      - "1"
      - --max-instances
      - "10"
      - --set-secrets
      - DATABASE_URL=database-url:latest
      - --set-secrets
      - ADMIN_PASSWORD=admin-password:latest
      - --set-secrets
      - SESSION_SECRET=session-secret:latest
      - --set-secrets
      - CLERK_PUBLISHABLE_KEY=clerk-publishable-key:latest
      - --set-secrets
      - CLERK_SECRET_KEY=clerk-secret-key:latest
      - --set-env-vars
      - NODE_ENV=production,PORT=8080,LOG_LEVEL=info

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:latest
